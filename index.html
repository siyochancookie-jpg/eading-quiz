<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S6 English Reading Quiz - Chairoikoguma Theme</title>
    <style>
        /* Chairoikoguma & Blue Wolf Theme Colors */
        :root { 
            --dark-brown: #5d4037;   /* Chairoikoguma brown */
            --light-blue: #a1d6f5;   /* Blue Wolf light blue */
            --warm-white: #fffcf5;   /* Background */
            --success: #8bc34a; 
            --error: #ff7043;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--light-blue); 
            margin: 0; 
            padding: 15px;
            color: var(--dark-brown);
        }

        .container { 
            max-width: 650px; 
            margin: auto; 
            background: var(--warm-white); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(93, 64, 55, 0.2);
            border: 4px solid var(--dark-brown);
        }

        h1 { 
            text-align: center; 
            font-size: 26px; 
            color: var(--dark-brown);
            border-bottom: 3px dashed var(--light-blue);
            padding-bottom: 10px;
        }

        /* Welcome Screen */
        #welcome-screen { 
            text-align: center; 
            padding: 50px 10px; 
        }

        #quiz-content { display: none; }

        .q-block { 
            margin-bottom: 25px; 
            padding: 15px; 
            background: white; 
            border-radius: 15px; 
            border: 2px solid var(--light-blue);
        }

        .options { list-style: none; padding: 0; }
        .options li { 
            margin: 10px 0; 
            padding: 10px; 
            border: 1px solid #eee; 
            border-radius: 10px;
            transition: 0.2s;
        }
        .options li:hover { background: #f0f8ff; }

        input[type="radio"] { 
            margin-right: 10px; 
            transform: scale(1.3); 
            accent-color: var(--dark-brown);
        }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .btn-start { background: var(--dark-brown); font-size: 22px; }
        #submit-btn { background: var(--dark-brown); }
        #reveal-btn { background: var(--error); }
        .btn:disabled { background: #ccc !important; box-shadow: none; }

        .result-tag { font-weight: bold; margin-top: 10px; display: none; padding: 10px; border-radius: 10px; }
        .correct { background: #d4edda; color: var(--success); border: 1px solid var(--success); }
        .wrong { background: #f8d7da; color: var(--error); border: 1px solid var(--error); }

        .admin-box { 
            margin-top: 60px; 
            padding: 20px; 
            border: 3px dotted var(--error); 
            border-radius: 15px; 
            background: #fffafa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐻 S6 English Reading Quiz 🐺</h1>

    <div id="welcome-screen">
        <p style="font-size: 20px; font-weight: bold;">Hello Students!</p>
        <p>Are you ready for the 40-question Reading Comprehension challenge?</p>
        <button class="btn btn-start" onclick="startQuiz()">Start Quiz Now</button>
    </div>

    <div id="quiz-content">
        <div id="quiz-list"></div>
        <button id="submit-btn" class="btn" onclick="submit()">Submit All Answers</button>
        
        <div id="msg" style="display:none; text-align:center; color:var(--success); font-weight:bold; margin-top:20px;">
            <p style="font-size: 24px;">✔ Done!</p>
            <p>Your answers are safe with me.<br>Wait for your teacher to reveal the results!</p>
        </div>

        <div class="admin-box">
            <p style="color:var(--error); font-weight:bold; margin:0; text-align:center;">Teacher's Magic Button</p>
            <button id="reveal-btn" class="btn" onclick="reveal()">Reveal All Answers</button>
        </div>
    </div>
</div>

<script>
const questions = [
    // PDF 1 (1-20)
    { q: "What is the main benefit of using solar power?", a: "B", opts: ["Increase electricity bills", "Reduce negative impact on nature", "Build more factories"] },
    { q: "What should businesses do besides making a profit?", a: "B", opts: ["Sell more coffee", "Help the community", "Close shop early"] },
    { q: "Why are investors choosing 'green' companies?", a: "B", opts: ["Produce more waste", "Care about Earth's future", "Recycling is expensive"] },
    { q: "What does ethical labor ensure for workers?", a: "B", opts: ["Lower pay", "Fair pay and safety", "Long working hours"] },
    { q: "Why is paper packaging better than plastic?", a: "B", opts: ["More colorful", "Breaks down faster/safer for animals", "Harder to carry"] },
    { q: "How does remote work help the environment?", a: "B", opts: ["Increase office space", "Reduce air pollution from travel", "Work longer"] },
    { q: "What is one positive effect of AI in healthcare?", a: "B", opts: ["Replacing humans", "Improving efficiency", "Harder data"] },
    { q: "Why is digital literacy important?", a: "B", opts: ["Buy gadgets", "Stay safe online", "Play games"] },
    { q: "What happens if e-waste is not recycled correctly?", a: "B", opts: ["Turns to gold", "Chemicals leak into soil", "Devices work again"] },
    { q: "How do smart cities save energy?", a: "B", opts: ["Lights off", "Sensors for street lights", "More roads"] },
    { q: "Who does fair trade mainly help?", a: "B", opts: ["Owners", "Farmers in developing countries", "Factory workers"] },
    { q: "What are schools encouraging for mental health?", a: "B", opts: ["Hide stress", "Talk about feelings", "No breaks"] },
    { q: "One benefit of urban gardening?", a: "B", opts: ["Hotter buildings", "Fresh food for cities", "Too much space"] },
    { q: "Result of a diverse team?", a: "A", opts: ["More creative ideas", "More arguments", "Fewer people"] },
    { q: "Why use public transportation?", a: "B", opts: ["More traffic", "Reduce CO2 and traffic", "Faster than car"] },
    { q: "Problem caused by fast fashion?", a: "B", opts: ["Too expensive", "Water pollution", "Lasts 20 years"] },
    { q: "How does reducing food waste help?", a: "B", opts: ["Fill landfills", "Feed hungry people", "More expensive"] },
    { q: "Why are renewable resources better than coal?", a: "B", opts: ["More smoke", "Never run out and cleaner", "Older than oil"] },
    { q: "Result of good corporate governance?", a: "A", opts: ["Builds trust", "Selfish leaders", "Secretive"] },
    { q: "Goal of zero-waste lifestyle?", a: "B", opts: ["More plastic", "Send nothing to trash", "Drink water"] },
    // PDF 2 (21-40)
    { q: "Primary purpose of carbon sequestration?", a: "B", opts: ["Release CO2", "Store harmful gases underground", "Reduce cost", "Replace renewables"] },
    { q: "Potential downside of electric vehicles?", a: "C", opts: ["Faster", "No support", "Mining materials for batteries", "Not popular"] },
    { q: "How does AI assist teachers?", a: "C", opts: ["Replacing them", "Harder tasks", "Handling routine tasks like grading", "Less study"] },
    { q: "Why microplastics are a threat to humans?", a: "B", opts: ["Salty water", "Consumed through seafood", "Block ships", "Deep water"] },
    { q: "Major advantage of vertical farming?", a: "C", opts: ["LED cost", "Rural only", "Reduces water consumption", "Cheaper"] },
    { q: "What does 'corporate transparency' involve?", a: "B", opts: ["Hiding losses", "Sharing eco/social info", "Increase price", "Hiring overseas"] },
    { q: "Example of 'Social' in ESG?", a: "C", opts: ["Reduce energy", "Board changes", "Gender pay equality", "New factory"] },
    { q: "Why ethical sourcing for tech brands?", a: "B", opts: ["Cheap materials", "Avoid protests", "Speed up", "Child labor"] },
    { q: "Main characteristic of greenwashing?", a: "B", opts: ["Helping nature", "False eco claims", "Green water", "Lower price"] },
    { q: "Goal of sustainable tourism?", a: "B", opts: ["Max tourists", "Protect for future", "Luxury resorts", "No travel"] },
    { q: "Disadvantage of gig economy?", a: "B", opts: ["Flexibility", "Lack of job benefits", "Same office", "High taxes"] },
    { q: "Why workplace wellness?", a: "B", opts: ["Long hours", "Reduce turnover/increase productivity", "Save furniture", "Replace insurance"] },
    { q: "What does digital divide lead to?", a: "B", opts: ["Faster internet", "Unfairness in education/employment", "Expensive PCs", "Less shopping"] },
    { q: "Effect of aging population?", a: "C", opts: ["Surplus of youth", "Less hospitals", "Increased healthcare demand", "Lower taxes"] },
    { q: "Minimalist solution to overconsumption?", a: "B", opts: ["Buy online", "Fewer but better items", "Throw all", "More ads"] },
    { q: "Hidden cost of fast fashion?", a: "B", opts: ["High price", "Environmental damage", "Shipping", "Salaries"] },
    { q: "What is 'intermittency' problem?", a: "C", opts: ["Expensive", "Panels big", "Sources not always available", "Dislike turbines"] },
    { q: "Why is biodiversity important?", a: "B", opts: ["Tourists", "Ecosystem stays strong", "Palm oil", "Prevent death"] },
    { q: "Main conflict in tech responsibility?", a: "B", opts: ["Profit vs Tech", "Monitoring vs Free speech", "Big vs Small", "Misinfo vs Ads"] },
    { q: "What are 'soft skills'?", a: "B", opts: ["Coding", "Interpersonal/teamwork", "Physical", "Software"] }
];

function startQuiz() {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('quiz-content').style.display = 'block';
    renderQuiz();
}

function renderQuiz() {
    const list = document.getElementById('quiz-list');
    list.innerHTML = '';
    questions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `
            <p><strong>Q${i+1}.</strong> ${item.q}</p>
            <ul class="options">
                ${item.opts.map((opt, idx) => `
                    <li><label><input type="radio" name="q${i}" value="${String.fromCharCode(65+idx)}"> ${String.fromCharCode(65+idx)}. ${opt}</label></li>
                `).join('')}
            </ul>
            <div id="res-${i}" class="result-tag"></div>
        `;
        list.appendChild(div);
    });
}

function submit() {
    const answered = document.querySelectorAll('input:checked').length;
    if(answered < questions.length) {
        if(!confirm("You haven't finished all questions! Submit anyway?")) return;
    }
    document.querySelectorAll('input').forEach(i => i.disabled = true);
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('msg').style.display = 'block';
    window.scrollTo(0,0);
}

function reveal() {
    questions.forEach((item, i) => {
        const res = document.getElementById(`res-${i}`);
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const userVal = selected ? selected.value : "None";
        res.style.display = "block";
        if(userVal === item.a) {
            res.innerText = "✓ Correct!";
            res.className = "result-tag correct";
        } else {
            res.innerText = "✗ Wrong! Answer: " + item.a;
            res.className = "result-tag wrong";
        }
    });
}
</script>
</body>
</html>
